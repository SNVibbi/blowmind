name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Dummy Firebase config — the client SDK only needs these present at build
# time; nothing here talks to a real project.
env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK (for the Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # firebase-tools v15 requires JDK 21+ for the emulators.
          java-version: "21"

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Security-rule tests (Firestore emulator)
        run: npm run test:rules

      - name: Build Cloud Functions
        run: |
          npm --prefix functions ci
          npm --prefix functions run build

      - name: Production build
        run: npm run build
